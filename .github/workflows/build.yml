name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v3
        with:
          channel: 'stable'
          version: '3.22.0'

      - name: Fix project structure and keep user code
        run: |
          # 备份你的代码和资源
          cp lib/main.dart /tmp/main.dart
          cp pubspec.yaml /tmp/pubspec.yaml
          if [ -d assets ]; then cp -r assets /tmp/assets; fi

          # 清空目录（保留 .git）
          find . -maxdepth 1 ! -name '.git' ! -name '.' ! -name '..' -exec rm -rf {} +

          # 重建 Flutter 工程
          flutter create --project-name alive_ai .

          # 恢复你的代码和资源
          cp /tmp/main.dart lib/main.dart
          cp /tmp/pubspec.yaml pubspec.yaml
          if [ -d /tmp/assets ]; then cp -r /tmp/assets assets; fi

          # 改名
          sed -i 's/android:label=".*"/android:label="Half-hearted AI"/' android/app/src/main/AndroidManifest.xml

          # 替换图标（如果 assets 文件夹被恢复并有图标）
          if [ -f assets/ic_launcher.png ]; then
            cp assets/ic_launcher.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
