name: Build Flutter APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v3
        with:
          channel: 'stable'
          version: '3.32.0'

      - name: Fix project structure and keep user code
        run: |
          # 备份
          if [ -d lib ]; then cp -r lib /tmp/lib; fi
          cp pubspec.yaml /tmp/pubspec.yaml
          if [ -d assets ]; then cp -r assets /tmp/assets; fi

          # 清空
          find . -maxdepth 1 ! -name '.git' ! -name '.' ! -name '..' -exec rm -rf {} +

          # 重建
          flutter create --project-name alive_ai .

          # 恢复
          if [ -d /tmp/lib ]; then rm -rf lib && cp -r /tmp/lib lib; fi
          cp /tmp/pubspec.yaml pubspec.yaml
          if [ -d /tmp/assets ]; then cp -r /tmp/assets assets; fi

          # 安全修改 compileSdkVersion 到 36（支持新旧格式）
          if [ -f android/app/build.gradle ]; then
            sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 36/' android/app/build.gradle
          elif [ -f android/app/build.gradle.kts ]; then
            sed -i 's/compileSdkVersion = flutter.compileSdkVersion/compileSdkVersion = 36/' android/app/build.gradle.kts
          fi

          # 固定签名
          keytool -genkey -v -keystore android/app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" || true

          # 注入权限
          for perm in READ_EXTERNAL_STORAGE WRITE_EXTERNAL_STORAGE MANAGE_EXTERNAL_STORAGE INTERNET RECORD_AUDIO; do
            sed -i "/<application/i\    <uses-permission android:name=\"android.permission.$perm\"/>" android/app/src/main/AndroidManifest.xml
          done

          # 改名
          sed -i 's/android:label=".*"/android:label="Half-hearted AI"/' android/app/src/main/AndroidManifest.xml

          # 替换图标
          if [ -f assets/ic_launcher.png ]; then
            cp assets/ic_launcher.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
